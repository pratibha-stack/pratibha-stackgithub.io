<!DOCTYPE html>
<html>
<head>
<title>Tourist Enquiry</title>
<link rel="stylesheet" href="style.css">
<script src="enquiry.js"></script>
</head>

<body>

<h1>Tourist Enquiry Form</h1>

<form onsubmit="return validateForm()">

Name:
<input type="text" id="name"><br><br>

Email:
<input type="text" id="email"><br><br>

Country:
<input type="text" id="country"><br><br>

Number of Visitors:
<input type="number" id="visitors"><br><br>

Message:
<textarea id="message"></textarea><br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
